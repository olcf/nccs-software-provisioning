# NSP_system_name
# NSP_help_email
# NSP_site_name

NSP_install_root: "{{ ['/sw', NSP_system_name] | path_join }}"

NSP_module_root: "{{ [NSP_install_root, 'modules'] | path_join }}"

NSP_max_threads: "{{ [((ansible_processor_nproc * 0.75) | int | abs), 16] | min }}"

NSP_scratch_directory: "{{ ['/tmp', ansible_user_id] | path_join }}"
NSP_keep_scratch_clear: false

NSP_user: "{{ ansible_user_uid }}"
NSP_group: "{{ ansible_user_gid }}"
NSP_file_permissions: "644"
NSP_executable_permissions: "755"

NSP_architecture: "{{ ansible_architecture }}"

NSP_template_header: |-
  | WARNING! This file is managed by Ansible.
  | Do NOT make manual changes to this file.
  | Please email {{ NSP_help_email }} to request a change.

  | Info:
  |   Role: {{ ansible_role_name }}
  {% if (template_path is defined) and (playbook_dir is defined) and (playbook_dir in template_path) %}
  |   {{ NSP_site_name }} Template: {{ template_path.replace(playbook_dir, '').lstrip('/') }}
  {% elif template_path is defined %}
  |   NSP Template: {{ template_path }}
  {% endif %}
  |   User: {{ ansible_user_id }}
