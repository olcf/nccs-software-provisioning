argument_specs:
  main:
    description:
      - Installs MPICH and optionally generates a module file.
    options:
      NSP_MPICH_version:
        type: str
        required: true
        description: The version to install.
      NSP_MPICH_patchelf:
        type: str
        required: false
        default: /usr/bin/patchelf
        description: The path to the patchelf executable.
      NSP_MPICH_ofi_version:
        type: str
        required: true
        description: The version of Libfabric.
      NSP_MPICH_ofi_prefix:
        type: str
        required: true
        description: The path to Libfabric.
      NSP_MPICH_rocm_version:
        type: str
        required: true
        description: The version of ROCm.
      NSP_MPICH_rocm_prefix:
        type: str
        required: true
        description: The path to ROCm.
      NSP_MPICH_pmi2_prefix:
        type: str
        required: true
        description: The path to pmi2.
      NSP_MPICH_create_module:
        type: bool
        required: false
        default: true
        description: Toggles module generation.
      NSP_MPICH_clear_source:
        type: bool
        required: false
        default: true
        description: Clear previous build source files.
